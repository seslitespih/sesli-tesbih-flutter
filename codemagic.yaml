workflows:
  ios-app-store:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - "1"
      vars:
        BUNDLE_ID: com.sesliTesbih.app
        APP_ORG: com.sesliTesbih
        APP_PROJECT: sesli_tesbih
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.sesliTesbih.app

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Create iOS project if missing
        script: |
          if [ ! -d "ios" ]; then
            flutter create --platforms ios . \
              --org "$APP_ORG" \
              --project-name "$APP_PROJECT"
          fi

      - name: Localize app name
        script: |
          # English
          mkdir -p ios/Runner/en.lproj
          if [ -f "ios/Runner/en.lproj/InfoPlist.strings" ]; then
            sed -i '' 's/CFBundleDisplayName = .*/CFBundleDisplayName = "Vocal Tasbeeh";/' \
              ios/Runner/en.lproj/InfoPlist.strings
          else
            printf 'CFBundleDisplayName = "Vocal Tasbeeh";\n' \
              > ios/Runner/en.lproj/InfoPlist.strings
          fi
          # Turkish
          mkdir -p ios/Runner/tr.lproj
          printf 'CFBundleDisplayName = "Sesli Tespih";\n' \
            > ios/Runner/tr.lproj/InfoPlist.strings
          # Arabic
          mkdir -p ios/Runner/ar.lproj
          printf 'CFBundleDisplayName = "مسبحة صوتية";\n' \
            > ios/Runner/ar.lproj/InfoPlist.strings
          # Add TR and AR to Xcode project via xcodeproj gem
          ruby << 'RUBY'
          require 'xcodeproj'
          proj = Xcodeproj::Project.open('ios/Runner.xcodeproj')
          target = proj.targets.find { |t| t.name == 'Runner' }
          runner_group = proj.main_group.find_subpath('Runner', false)
          ['tr', 'ar'].each { |l| proj.root_object.known_regions |= [l] }
          vg = runner_group.children.find { |c|
            c.is_a?(Xcodeproj::Project::Object::PBXVariantGroup) &&
            c.name == 'InfoPlist.strings'
          }
          unless vg
            vg = proj.new(Xcodeproj::Project::Object::PBXVariantGroup)
            vg.name = 'InfoPlist.strings'
            runner_group.children << vg
            target.resources_build_phase.add_file_reference(vg)
          end
          ['tr', 'ar'].each do |lang|
            next if vg.children.any? { |c| c.name == lang }
            ref = proj.new(Xcodeproj::Project::Object::PBXFileReference)
            ref.name = lang
            ref.path = "#{lang}.lproj/InfoPlist.strings"
            ref.source_tree = '<group>'
            ref.last_known_file_type = 'text.plist.strings'
            vg.children << ref
          end
          proj.save
          RUBY

      - name: Generate app icons
        script: flutter pub run flutter_launcher_icons

      - name: Add iOS permissions to Info.plist
        script: |
          PLIST="ios/Runner/Info.plist"
          if ! grep -q "NSMicrophoneUsageDescription" "$PLIST"; then
            /usr/libexec/PlistBuddy -c \
              "Add :NSMicrophoneUsageDescription string 'Microphone is required for voice dhikr counting. Audio is never recorded.'" \
              "$PLIST"
            /usr/libexec/PlistBuddy -c \
              "Add :NSSpeechRecognitionUsageDescription string 'Speech recognition is used to detect dhikr words.'" \
              "$PLIST"
            /usr/libexec/PlistBuddy -c \
              "Add :NSLocationWhenInUseUsageDescription string 'Location is required to calculate prayer times and Qibla direction.'" \
              "$PLIST"
            /usr/libexec/PlistBuddy -c \
              "Add :NSLocationAlwaysAndWhenInUseUsageDescription string 'Location is required to calculate prayer times and Qibla direction.'" \
              "$PLIST"
            /usr/libexec/PlistBuddy -c \
              "Add :ITSAppUsesNonExemptEncryption bool false" \
              "$PLIST"
          fi
          /usr/libexec/PlistBuddy -c \
            "Set :CFBundleDisplayName 'Vocal Tasbeeh'" \
            "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c \
            "Add :CFBundleDisplayName string 'Vocal Tasbeeh'" \
            "$PLIST"

      - name: Set bundle identifier
        script: |
          cd ios
          sed -i '' \
            "s/PRODUCT_BUNDLE_IDENTIFIER = .*/PRODUCT_BUNDLE_IDENTIFIER = $BUNDLE_ID;/g" \
            Runner.xcodeproj/project.pbxproj

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Flutter build IPA
        script: flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
      email:
        recipients:
          - ssaglamess@gmail.com
        notify:
          success: true
          failure: true
