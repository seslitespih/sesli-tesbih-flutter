workflows:
  ios-app-store:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - "1"
      vars:
        BUNDLE_ID: com.sesliTesbih.app
        APP_ORG: com.sesliTesbih
        APP_PROJECT: sesli_tesbih
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.sesliTesbih.app

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Create iOS project if missing
        script: |
          if [ ! -d "ios" ]; then
            flutter create --platforms ios . \
              --org "$APP_ORG" \
              --project-name "$APP_PROJECT"
          fi

      - name: Generate app icons
        script: flutter pub run flutter_launcher_icons

      - name: Add iOS permissions to Info.plist
        script: |
          PLIST="ios/Runner/Info.plist"
          if ! grep -q "NSMicrophoneUsageDescription" "$PLIST"; then
            /usr/libexec/PlistBuddy -c \
              "Add :NSMicrophoneUsageDescription string 'Microphone is required for voice dhikr counting. Audio is never recorded.'" \
              "$PLIST"
            /usr/libexec/PlistBuddy -c \
              "Add :NSSpeechRecognitionUsageDescription string 'Speech recognition is used to detect dhikr words.'" \
              "$PLIST"
            /usr/libexec/PlistBuddy -c \
              "Add :NSLocationWhenInUseUsageDescription string 'Location is required to calculate prayer times and Qibla direction.'" \
              "$PLIST"
            /usr/libexec/PlistBuddy -c \
              "Add :NSLocationAlwaysAndWhenInUseUsageDescription string 'Location is required to calculate prayer times and Qibla direction.'" \
              "$PLIST"
            /usr/libexec/PlistBuddy -c \
              "Add :ITSAppUsesNonExemptEncryption bool false" \
              "$PLIST"
          fi

      - name: Set bundle identifier
        script: |
          cd ios
          sed -i '' \
            "s/PRODUCT_BUNDLE_IDENTIFIER = .*/PRODUCT_BUNDLE_IDENTIFIER = $BUNDLE_ID;/g" \
            Runner.xcodeproj/project.pbxproj

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Flutter build IPA
        script: flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
      email:
        recipients:
          - ssaglamess@gmail.com
        notify:
          success: true
          failure: true
