name: sesli_tesbih
description: Vocal Tasbeeh - Vocal Islamic Dhikr Counter
publish_to: 'none'
version: 1.3.0+6

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  speech_to_text: ^6.6.2
  adhan_dart: ^2.0.1
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  shared_preferences: ^2.3.3
  permission_handler: ^11.3.1
  flutter_compass: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: false
  ios: true
  image_path: "app_icon.png"
  min_ios_version: "12.0"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
